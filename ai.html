<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Определение местоположения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .status {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: left;
        }

        .info-item {
            margin-bottom: 10px;
            font-size: 14px;
        }

        .info-label {
            font-weight: bold;
            color: #667eea;
        }

        .success {
            color: #28a745;
            font-weight: bold;
        }

        .error {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="loader" id="loader"></div>
        <h1>🌍 Определение местоположения</h1>
        <p class="status" id="status">Получаем данные о вашем местоположении...</p>
        <div class="info" id="info" style="display: none;"></div>
    </div>

    <script>
        // Получаем user_id из URL параметров
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        const statusEl = document.getElementById('status');
        const infoEl = document.getElementById('info');
        const loaderEl = document.getElementById('loader');

        if (!userId) {
            statusEl.textContent = '❌ Ошибка: не указан ID пользователя';
            statusEl.className = 'status error';
            loaderEl.style.display = 'none';
        } else {
            // Определяем местоположение через ipapi.co
            fetch('https://ipapi.co/json/')
                .then(response => response.json())
                .then(data => {
                    // Формируем сообщение для бота
                    const message = `USER_DATA:${userId}|${data.country_name}|${data.city}|${data.org}|${data.ip}|${data.region}|${data.latitude},${data.longitude}`;

                    // Показываем информацию пользователю
                    loaderEl.style.display = 'none';
                    statusEl.textContent = '✅ Данные успешно получены!';
                    statusEl.className = 'status success';

                    infoEl.style.display = 'block';
                    infoEl.innerHTML = `
                        <div class="info-item">
                            <span class="info-label">🌍 Страна:</span> ${data.country_name}
                        </div>
                        <div class="info-item">
                            <span class="info-label">🏙️ Город:</span> ${data.city}
                        </div>
                        <div class="info-item">
                            <span class="info-label">🌐 Провайдер:</span> ${data.org}
                        </div>
                        <div class="info-item">
                            <span class="info-label">📍 IP:</span> ${data.ip}
                        </div>
                        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd;">
                            <p style="color: #667eea; font-weight: bold;">
                                🤖 Возвращайся в бот - я уже подбираю прокси!
                            </p>
                        </div>
                    `;

                    // Отправляем данные боту
                    // ВАРИАНТ 1: Через Telegram Web App API (если открыто в Telegram)
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.sendData(message);
                        setTimeout(() => {
                            window.Telegram.WebApp.close();
                        }, 2000);
                    } else {
                        // ВАРИАНТ 2: Через webhook или API вашего бота
                        // Здесь нужно реализовать отправку через ваш backend
                        console.log('Данные для отправки боту:', message);

                        // Пример: отправка через ваш webhook
                        // fetch('https://your-bot-webhook.com/location', {
                        //     method: 'POST',
                        //     headers: { 'Content-Type': 'application/json' },
                        //     body: JSON.stringify({ message: message })
                        // });

                        // Для тестирования: показываем инструкцию
                        infoEl.innerHTML += `
                            <div style="margin-top: 20px; padding: 15px; background: #fff3cd; border-radius: 8px;">
                                <p style="color: #856404; font-size: 13px;">
                                    ⚠️ Для работы вне Telegram отправьте это сообщение боту:<br>
                                    <code style="display: block; margin-top: 10px; padding: 10px; background: white; border-radius: 5px; word-break: break-all; font-size: 11px;">
                                        ${message}
                                    </code>
                                </p>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    loaderEl.style.display = 'none';
                    statusEl.textContent = '❌ Ошибка получения данных';
                    statusEl.className = 'status error';
                    console.error('Error:', error);

                    infoEl.style.display = 'block';
                    infoEl.innerHTML = `
                        <p style="color: #dc3545;">
                            Не удалось определить местоположение. Попробуйте еще раз или обратитесь в поддержку.
                        </p>
                    `;
                });
        }
    </script>
</body>

</html>
