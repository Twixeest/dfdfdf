<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxy Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #007aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success { color: #28a745; font-size: 48px; margin: 20px 0; }
        .error { color: #dc3545; font-size: 48px; margin: 20px 0; }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }
        a { color: #007aff; text-decoration: none; display: block; margin-top: 16px; }
        .info-box { background: #f5f5f5; border-radius: 16px; padding: 16px; margin: 20px 0; text-align: left; font-size: 14px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd; }
        .info-label { font-weight: bold; color: #333; }
        footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 48px;">🌍</div>
        <h2 id="title">Определение IP</h2>
        <div id="content">
            <div class="loader"></div>
            <p>Получаем данные...</p>
        </div>
        <footer>Proxy Assistant AI</footer>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        const BOT_TOKEN = '8640832584:AAFPBCUqqQEi-S9hJ8XGEmbLb0aIkufn7K4';
        
        const titleEl = document.getElementById('title');
        const contentEl = document.getElementById('content');

        async function sendToBot(data) {
            if (!userId) {
                showError('Неверная ссылка. Запроси новую в боте.');
                return;
            }
            
            // Формат: USER_DATA:user_id|country|city|isp|ip|region|lat,lon
            const message = `USER_DATA:${userId}|${data.country_name}|${data.city}|${data.org}|${data.ip}|${data.region}|${data.latitude},${data.longitude}`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: userId, text: message })
                });
                const result = await response.json();
                if (result.ok) {
                    showSuccess(data);
                } else {
                    showError('Ошибка отправки данных в бота');
                }
            } catch (e) {
                console.error(e);
                showError('Ошибка сети. Проверь интернет.');
            }
        }

        async function getLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                await sendToBot(data);
            } catch (err) {
                showError('Не удалось определить местоположение');
            }
        }

        function showSuccess(data) {
            contentEl.innerHTML = `
                <div class="success">✅</div>
                <div class="info-box">
                    <div class="info-row"><span class="info-label">🌍 Страна:</span> <span>${data.country_name || '—'}</span></div>
                    <div class="info-row"><span class="info-label">🏙️ Город:</span> <span>${data.city || '—'}</span></div>
                    <div class="info-row"><span class="info-label">📡 Провайдер:</span> <span>${data.org || '—'}</span></div>
                    <div class="info-row"><span class="info-label">🔌 IP:</span> <span>${data.ip || '—'}</span></div>
                </div>
                <p style="color: #28a745; margin: 10px 0;">✅ Данные отправлены в бота!</p>
                <button onclick="window.location.href='https://t.me/MTProtoProxyAIbot'">🔙 Вернуться в Telegram</button>
            `;
            titleEl.textContent = 'Готово!';
        }

        function showError(msg) {
            contentEl.innerHTML = `
                <div class="error">⚠️</div>
                <p style="color: #dc3545;">${msg}</p>
                <button onclick="window.location.reload()">🔄 Попробовать снова</button>
                <a href="https://t.me/MTProtoProxyAIbot">← Вернуться в Telegram</a>
            `;
            titleEl.textContent = 'Ошибка';
        }

        getLocation();
    </script>
</body>
</html>
